<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Website 🌦️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Julius+Sans+One&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&family=Rye&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="header">
        <h1>Weather 🌦️</h1>
    </div>
    <div class="container-fluid">
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Enter a City"
                aria-label="Example text with button addon" aria-describedby="button-addon1" id="get_it">
            <button class="btn btn-outline-secondary" type="button" id="get_it_button">Get the weather</button>
        </div>


        <div id="weather-result" class="mt-3"></div>
        <div class="results" >



            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">The date is:</h5>
                    <p class="card-text" id="time"></p>
                </div>
                <div class="card-body">
                    <h5 class="card-title">Temperature:</h5>
                    <p class="card-text" id="temp"></p>
                </div>
                <div class="card-body">
                    <h5 class="card-title">Wind speed:</h5>
                    <p class="card-text" id="speed"></p>
                </div>

            </div>


        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
